    title: Agent identity and passport standards — ERC-8004, Kite, RNWY, World ID
    queries:
      - "ERC-8004 trustless agent identity 2026"
      - "Kite agent passport payments 2026"
      - "RNWY soulbound agent passport 2026"
      - "World ID agentkit AI verification 2026"
      - "did:agent decentralized identifier 2026"
