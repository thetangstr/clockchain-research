  # ──────────────────────────────────────────────────────────────────────
  # BUCKET 3 — Standards / competitive briefs (~25% of rotation)
  # Track the regulatory clock, established legal standards, and direct
  # competitive products in the agent-identity and timestamping space.
  # ──────────────────────────────────────────────────────────────────────

  standards-eu-ai-act-implementation:
    bucket: standards-competitive
    title: EU AI Act implementation clock — Article 12, 13, 14, 15, 50, 72
    queries:
      - "EU AI Act Article 12 logging requirement 2026"
      - "EU AI Act Article 13 transparency deployer 2026"
      - "EU AI Act Article 72 post-market monitoring 2026"
      - "EU AI Act August 2026 deadline high-risk 2026"
      - "AI Act enforcement penalty fine 2026"
