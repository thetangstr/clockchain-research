  use-case-legal-contract-automation:
    bucket: use-case
    title: Legal contract automation and eDiscovery — judicial admissibility
    queries:
      - "AI contract automation legal admissibility 2026"
      - "eDiscovery AI agent provenance custody 2026"
      - "legal AI agent attorney work product audit 2026"
      - "smart contract dispute resolution AI 2026"
      - "legal tech AI agent compliance"
