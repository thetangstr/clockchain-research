  use-case-regulated-saas-internal-agents:
    bucket: use-case
    title: Internal agents inside regulated B2B SaaS — Salesforce Agentforce, ServiceNow, SAP Joule
    queries:
      - "Salesforce Agentforce enterprise audit log 2026"
      - "ServiceNow agent automation compliance 2026"
      - "SAP Joule enterprise AI audit 2026"
      - "regulated SaaS internal agent governance 2026"
      - "enterprise agent platform compliance audit 2026"
