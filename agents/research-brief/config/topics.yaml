  standards-agent-economy-and-rights:
    bucket: standards-competitive
    title: Agent economy and rights frameworks — x402, Skyfire, Story Protocol, agent treasuries
    queries:
      - "x402 agent payment protocol adoption 2026"
      - "Skyfire agent payments 2026"
      - "Story Protocol agent rights on-chain 2026"
      - "autonomous agent treasury wallet custody 2026"
      - "a16z KYA know your agent framework"
    keywords: [x402, skyfire, story-protocol, agent-economy, kya, agent-treasury]
