# Topic rotation for the Clockchain Research brief generator.
#
# Each brief is built to drive PRODUCT DEFINITION for Yang's two trust-layer
# products (on-chain agent identity + Clockchain Agent-SDK) plus the two
# stretch products (agent credits, agent smart receipts).
#
# Three buckets, sixteen topics. pick-topic.sh rotates across them and skips
# any topic that appeared in the last two briefs. Briefs land Tue + Fri 7am PT.
#
# Adding or removing topics is safe — just keep keys lowercase-with-dashes and
# update the topic enum in schema/brief.schema.json to match.

tracks:
  # ──────────────────────────────────────────────────────────────────────
  # BUCKET 1 — Customer-profile briefs (~45% of rotation)
  # Pick one specific company or product. Dissect their current observability
  # stack, gap against EU AI Act + court-admissibility, and the integration
  # shape Clockchain would have to ship for them.
  # ──────────────────────────────────────────────────────────────────────

  customer-profile-agentdash-validation:
    bucket: customer-profile
    title: AgentDash — sister product and design partner of record for Products A and B
    queries:
      - "AgentDash CoS multi-human agent workspace 2026"
      - "Paperclip agent harness adapters audit"
      - "AgentDash plugin worker SDK integration"
      - "AgentDash enterprise audit log compliance"
      - "multi-agent dispatch CoS pattern identity"
    keywords: [agentdash, paperclip, cos, multi-human, adapter, sister-product]

  customer-profile-langchain-langsmith:
    bucket: customer-profile
    title: LangChain and LangSmith — the dominant agent observability stack
    queries:
      - "LangSmith observability EU AI Act compliance 2026"
      - "LangChain LangGraph callback handler audit trail 2026"
      - "LangSmith data residency BYOC self-hosted 2026"
      - "LangGraph interrupt human-in-the-loop article 14 2026"
      - "LangChain enterprise audit logging tamper evident"
    keywords: [langchain, langsmith, langgraph, callback-handler, observability, eu-ai-act]

  customer-profile-anthropic-agent-sdk:
    bucket: customer-profile
    title: Anthropic Agent SDK and Claude Code managed agents
    queries:
      - "Anthropic Agent SDK observability tracing 2026"
      - "Claude Code managed agents enterprise audit 2026"
      - "Anthropic computer use agent logging compliance 2026"
      - "Claude agent skills permissions audit trail 2026"
      - "Anthropic enterprise customer audit requirements"
    keywords: [anthropic, claude-code, agent-sdk, claude-agents, skills, computer-use]

  customer-profile-openai-agents-sdk:
    bucket: customer-profile
    title: OpenAI Agents SDK and Assistants API
    queries:
      - "OpenAI Agents SDK tracing observability 2026"
      - "OpenAI Assistants API audit logs enterprise 2026"
      - "OpenAI agent runs compliance logging EU 2026"
      - "OpenAI computer-using agent audit trail 2026"
      - "OpenAI enterprise SOC 2 AI compliance"
    keywords: [openai, agents-sdk, assistants-api, computer-use, enterprise-compliance]

  customer-profile-oss-agent-frameworks:
    bucket: customer-profile
    title: Open-source agent frameworks — CrewAI, AutoGen, LlamaIndex, Letta
    queries:
      - "CrewAI agent framework observability 2026"
      - "AutoGen multi-agent audit logging 2026"
      - "LlamaIndex agent tracing callback 2026"
      - "Letta agent memory audit trail 2026"
      - "OSS agent framework enterprise compliance"
    keywords: [crewai, autogen, llamaindex, letta, mem0, agent-framework]

  customer-profile-agent-observability-vendors:
    bucket: customer-profile
    title: Agent observability vendors — Helicone, Phoenix, Arize, OpenLLMetry, Datadog APM
    queries:
      - "Helicone agent observability 2026"
      - "Phoenix Arize agent tracing 2026"
      - "OpenLLMetry OpenTelemetry agent semantic conventions 2026"
      - "Datadog APM agent tracing 2026"
      - "agent observability tamper evident audit log 2026"
    keywords: [helicone, phoenix, arize, openllmetry, datadog, otel, observability]

  customer-profile-embedded-agent-products:
    bucket: customer-profile
    title: Products embedding agent SDKs — Notion AI, Linear AI, Slack AI, Cursor, Warp
    queries:
      - "Notion AI Claude Code integration audit 2026"
      - "Linear AI agent automation enterprise audit 2026"
      - "Slack AI agent logging enterprise 2026"
      - "Cursor agent workspace audit trail 2026"
      - "Warp terminal AI agent enterprise compliance 2026"
    keywords: [notion, linear, slack, cursor, warp, embedded-agent, integration]

  # ──────────────────────────────────────────────────────────────────────
  # BUCKET 2 — Use-case briefs (~30% of rotation)
  # Pick one regulated use case. Work out the evidentiary standard, who pays,
  # and what Product A + B need to look like to serve that segment.
  # ──────────────────────────────────────────────────────────────────────

  use-case-financial-audit-trails:
    bucket: use-case
    title: Financial-services agent audit trails — SOX, SEC 17a-4, MiFID II, FINRA
    queries:
      - "SEC 17a-4 immutable audit record AI agent 2026"
      - "MiFID II transaction reporting AI agent 2026"
      - "SOX 404 controls AI agent automation 2026"
      - "FINRA AI agent record keeping 2026"
      - "financial agent compliance audit trail blockchain 2026"
    keywords: [sox, sec-17a-4, mifid-ii, finra, financial-audit, regulated-finance]

  use-case-healthcare-clinical-logs:
    bucket: use-case
    title: Healthcare and clinical-decision agent logs — HIPAA, FDA, EHR
    queries:
      - "HIPAA audit trail AI agent clinical decision 2026"
      - "FDA AI ML clinical decision support good machine learning practice 2026"
      - "EHR agent audit log Epic Cerner 2026"
      - "clinical AI agent provenance traceability 2026"
      - "healthcare AI agent compliance audit 2026"
