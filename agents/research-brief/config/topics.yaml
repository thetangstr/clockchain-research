  standards-electronic-timestamping:
    bucket: standards-competitive
    title: Electronic timestamping legal standards — eIDAS 2.0, RFC 3161, ISO/IEC 18014, ESIGN
    queries:
      - "eIDAS 2.0 qualified electronic timestamp AI 2026"
      - "RFC 3161 timestamp authority blockchain 2026"
      - "ISO IEC 18014 timestamping AI compliance 2026"
      - "ESIGN Act electronic signature AI agent 2026"
